openapi: 3.0.3
info:
  title: EduQuiz Auth/User API Gateway
  version: 1.0.0
  description: |
    AuthService + UserService exposed through Cloudflare Worker API Gateway.
servers:
  - url: http://127.0.0.1:8787
    description: Local Worker (wrangler dev)
  - url: https://eduquiz-api.eduquiz-api.workers.dev
    description: Cloud Worker (production)
tags:
  - name: Auth
  - name: User
paths:
  /:
    get:
      summary: Gateway health and route manifest
      responses:
        "200":
          description: OK
  /auth/register:
    post:
      tags: [Auth]
      summary: Register with email/password
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
                device_id: { type: string }
      responses:
        "201": { description: Created }
        "400": { description: Invalid input / missing idempotency key }
        "409": { description: Email already exists }
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                device_id: { type: string }
      responses:
        "200": { description: OK }
        "400": { description: Invalid input / missing idempotency key }
        "401": { description: Unauthorized }
        "429": { description: Rate limited }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200": { description: OK }
        "401": { description: Session not found / expired }
        "403": { description: Session revoked }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200": { description: OK }
        "400": { description: Missing refresh token }
  /users/me:
    get:
      tags: [User]
      summary: Get my profile
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
    patch:
      tags: [User]
      summary: Update my profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                avatar: { type: string, nullable: true }
      responses:
        "200": { description: OK }
        "400": { description: No data to update }
        "401": { description: Unauthorized }
  /users/{id}:
    get:
      tags: [User]
      summary: Internal profile lookup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: header
          name: x-internal-token
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
        "403": { description: Internal token invalid }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

